apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-time
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-time
  template:
    metadata:
      labels:
        app: simple-time
    spec:
      containers:
        - name: app
          image: anupwade/simpletimeservice:latest
          ports:
            - containerPort: 5000

---
apiVersion: v1
kind: Service
metadata:
  name: simple-time-service
spec:
  type: ClusterIP
  selector:
    app: simple-time
  ports:
    - port: 80
      targetPort: 5000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: simple-time-ingress
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: simple-time-service
                port:
                  number: 80
